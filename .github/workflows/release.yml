name: release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run Release Please
        uses: googleapis/release-please-action@v4
        with:
          release-type: go
          token: ${{ secrets.GITHUB_TOKEN }}
  goreleaser:
    # only the release-please PR which will be merged to main will trigger this job or a manual dispatch
    if: ${{ github.event.head_commit.author.name == 'github-actions[bot]' || github.event_name == 'workflow_dispatch' }}
    needs: [release-please]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ vars.GO_BUILD_VERSION }}

      - name: Run GoReleaser (Full Release)
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bump-homebrew-tap:
    # Runs only after a successful release (goreleaser skipped -> this is skipped too).
    needs: [goreleaser]
    runs-on: ubuntu-latest
    steps:
      - name: Resolve released version
        id: ver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(gh release view --repo ${{ github.repository }} --json tagName -q .tagName | sed 's/^v//')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Trigger homebrew-tap formula update
        env:
          # PAT/App token with "contents: write" on conplementAG/homebrew-tap.
          # The default GITHUB_TOKEN cannot dispatch events to another repository.
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          gh api repos/conplementAG/homebrew-tap/dispatches \
            -f event_type=copsctl-release \
            -f "client_payload[version]=${{ steps.ver.outputs.version }}"
